name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  XCODE_VERSION: "26.4"

jobs:
  build:
    if: ${{ github.repository == 'rhinoc/douvo' || github.event_name == 'pull_request' }}
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            .build/arm64-apple-macosx
            .build/artifacts
            .build/checkouts
            .build/prebuilts
            .build/repositories
            .build/build.db
            .build/*.yaml
            .build/workspace-state.json
          key: swiftpm-build-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Swift build
        run: swift build

      - name: Validate app metadata and scripts
        run: |
          bash -n scripts/build-app.sh
          bash -n scripts/ensure-local-code-signing-identity.sh
          bash -n scripts/install-dev-app.sh
          plutil -lint Sources/Douvo/Info.plist
