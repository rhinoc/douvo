# Auto-release on push to main. Bumps VERSION, builds a DMG, updates Sparkle appcast,
# uploads a GitHub Release, updates the Homebrew tap, then commits release metadata.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  XCODE_VERSION: "26.4"

jobs:
  release:
    if: ${{ github.repository == 'rhinoc/douvo' && (github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore')) }}
    concurrency:
      group: release-${{ github.repository }}
      cancel-in-progress: false
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            .build/arm64-apple-macosx
            .build/artifacts
            .build/checkouts
            .build/prebuilts
            .build/repositories
            .build/build.db
            .build/*.yaml
            .build/workspace-state.json
          key: swiftpm-build-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Sync Sparkle SUFeedURL with this repo
        run: |
          FEED="https://raw.githubusercontent.com/${{ github.repository }}/main/appcast.xml"
          /usr/libexec/PlistBuddy -c "Set :SUFeedURL ${FEED}" Sources/Douvo/Info.plist

      - name: Swift tests
        run: swift test

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Bump version
        id: ver
        run: |
          NEW="$(scripts/update_version.sh)"
          echo "version=$NEW" >>"$GITHUB_OUTPUT"

      - name: Import code signing identity
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: scripts/code-sign-import.sh

      - name: Build release DMG
        run: scripts/build-dmg.sh

      - name: Collect DMG metadata
        id: dmg
        run: |
          DMG="dist/douvo-${{ steps.ver.outputs.version }}-macos.dmg"
          echo "sha256=$(shasum -a 256 "$DMG" | awk '{print $1}')" >>"$GITHUB_OUTPUT"

      - name: Update Sparkle appcast
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: scripts/update_appcast.sh

      - name: Upload GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/douvo-${{ steps.ver.outputs.version }}-macos.dmg
          asset_name: douvo-${{ steps.ver.outputs.version }}-macos.dmg
          tag: v${{ steps.ver.outputs.version }}
          overwrite: true
          body: |
            Download the DMG, open it, and drag `Douvo.app` to Applications.

            Browser and Homebrew downloads can be tagged with Gatekeeper quarantine. If macOS blocks first launch or says the app is from an unidentified developer, trust the installed app once:

            ```bash
            xattr -dr com.apple.quarantine /Applications/Douvo.app
            open /Applications/Douvo.app
            ```

            More detail: [README — Install](https://github.com/${{ github.repository }}/blob/main/README.md#install) · [SPARKLE.md](https://github.com/${{ github.repository }}/blob/main/SPARKLE.md)

      - name: Check Homebrew tap configuration
        id: homebrew
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY || format('{0}/homebrew-tap', github.repository_owner) }}
        run: |
          echo "repository=${HOMEBREW_TAP_REPOSITORY}" >>"$GITHUB_OUTPUT"
          if [[ -n "$HOMEBREW_TAP_TOKEN" ]]; then
            echo "enabled=true" >>"$GITHUB_OUTPUT"
          else
            echo "enabled=false" >>"$GITHUB_OUTPUT"
            echo "::notice::Skipping Homebrew tap update because HOMEBREW_TAP_GITHUB_TOKEN is not configured."
          fi

      - name: Check out Homebrew tap
        if: steps.homebrew.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.homebrew.outputs.repository }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew cask
        if: steps.homebrew.outputs.enabled == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.dmg.outputs.sha256 }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: scripts/update_homebrew_cask.sh homebrew-tap

      - name: Push Homebrew cask
        if: steps.homebrew.outputs.enabled == 'true'
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/douvo.rb
          if git diff --cached --quiet; then
            echo "Homebrew cask already up to date."
          else
            git commit -m "Update Douvo to ${VERSION}"
            git push
          fi

      - name: Commit version bump
        run: scripts/commit_release.sh
